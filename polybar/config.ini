[colors]
; Official Eldritch Palette
background = #040404
background-alt = #1f1d2e
foreground = #ebfafa
; The "Glow" colors
primary = #04d1f9
secondary = #a48add
alert = #f70067
disabled = #6272a4

[bar/matrix]
; You can rename this to [bar/eldritch] if you update your launch script
width = 100%
height = 24pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 2pt
border-color = ${colors.background-alt}

padding-left = 0
padding-right = 1
module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:size=10;2"

modules-left = i3
modules-center = date
modules-right = cpu memory battery network

cursor-click = pointer
enable-ipc = true

# --- Modules ---

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
index-sort = true

; Eldritch styling for workspaces
label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 1

label-unfocused = %index%
label-unfocused-foreground = ${colors.secondary}
label-unfocused-padding = 1

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.secondary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.secondary}
label = %percentage_used:2%%

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = AC
format-charging = <label-charging>
format-discharging = <label-discharging>
; Cleaned up hardcoded hex codes to use Eldritch Purple and Cyan
label-charging = %{F#a48add}󱐋 BAT %{F#04d1f9}%percentage%%
label-discharging = %{F#a48add}BAT %{F#04d1f9}%percentage%%
label-low = %{F#f70067}LOW %percentage%%

[module/network]
type = internal/network
interface = wlan0
interval = 3.0
format-connected = <label-connected>
; Use Purple for icon and Cyan for the network name
label-connected = %{F#a48add}󰖩 %{F#04d1f9}%essid%
label-disconnected = 󰖪 offline
label-disconnected-foreground = ${colors.disabled}
