# Set prefix to Alt+s
set -g prefix M-s
unbind C-b
bind M-s send-prefix

# Ensure Alt+s works quickly (no delay)
set -s escape-time 0

# Reload tmux configuration with Prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Matrix Reloaded!"

# --- Message / Prompt Style ---
# High-contrast Matrix green for the "Matrix Reloaded!" message
set -g message-style bg="#00FF41",fg=black,bold

# Style for the command prompt (when you hit Prefix + :)
set -g message-command-style bg=black,fg="#00FF41"

# Start window numbering at 1
set -g base-index 1

# Start pane numbering at 1 (for consistency)
setw -g pane-base-index 1

# Re-number windows automatically when one is closed
set -g renumber-windows on
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Status bar
#set -g @plugin 'vaaleyard/tmux-dotbar'
#set -g @tmux-dotbar-position top

# Load the Matrix theme
source-file ~/.config/tmux/themes/eldrich.conf
set -g status-position top

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'
# Move the status bar to the top of the terminal window
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
