# --- Modern Centered Eldritch Status Bar ---
set -g status-position top
set -g status-justify centre           # <--- This centers the window list
# Set status bar background slightly lighter than the terminal
# colour232 = very dark, colour234 = dark grey, colour236 = lighter grey
set -g status-style bg=colour235,fg=colour248

set -g status-interval 3

# Left side: Session name (aligned to the far left)
set -g status-left-length 50
set -g status-left "#[fg=#040404,bg=#04d1f9,bold]      󰭦 #S       #[fg=#04d1f9,bg=colour235,nobold]"

# Window list styling (The Centered Part)
# Inactive window: Clean purple text
setw -g window-status-style fg="#6272a4",bg=colour235
setw -g window-status-format " #[fg=#a48add]#I#[fg=#6272a4]:#W "

# Active window: The "Eldritch Pill"
setw -g window-status-current-style fg="#04d1f9",bg=colour235,bold
setw -g window-status-current-format "#[fg=#04d1f9,bg=colour235]#[fg=#040404,bg=#04d1f9] #I:#W #[fg=#04d1f9,bg=colour235]"

# Right side: System info (aligned to the far right)
set -g status-right-length 50
set -g status-right "#[fg=#32344a]#[fg=#a48add,bg=#32344a] 󰁹 #(acpi | cut -d ',' -f 2 | tr -d ' ') #[fg=#04d1f9,bg=#32344a]#[fg=#040404,bg=#04d1f9] 󱑎 %H:%M "

# Pane Borders 
set -g pane-border-style fg="#1f1d2e"
set -g pane-active-border-style fg="#04d1f9"
