# --- Matrix Theme Status Bar ---
set -g status-position top
set -g status-style bg="#000F00",fg="#00FF41"
set -g status-interval 5
set -g status-justify centre

set -g status-left-length 30
set -g status-left "#[fg=black,bg=#00FF41,bold] #S #[bg=#000F00,fg=#00FF41] "

setw -g window-status-style fg="#008F11",bg="#000F00"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style fg="#00FF41",bg="#000F00",bold
setw -g window-status-current-format "[#I:#W]"

set -g status-right-length 50
set -g status-right "#[fg=#00FF41]Batt: #(acpi | cut -d ',' -f 2 | tr -d ' ') #[fg=#00FF41]| %H:%M "
